<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Foodie - Access your account, view orders, and order your favorite food.">
    <title>Login — Foodie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages.css">
</head>

<body>
    <!-- HEADER -->
    <header>
        <nav class="navbar flex between wrapper">
            <a href="index.html" class="logo">Foodie.</a>
            <ul class="navlist flex gap-3">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu">Menu</a></li>
                <li><a href="index.html#how-it-works">Service</a></li>
                <li><a href="index.html#about">About us</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="desktop-action flex gap-2">
                <a href="cart.html" class="cart-icon" id="cart-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-value">0</span>
                </a>
                <a href="login.html" class="btn" id="sign-in-btn">
                    Sign in&NonBreakingSpace;<i class="fa-solid fa-arrow-right-from-bracket"></i>
                </a>
                <a href="#" class="hamburger" id="hamburger-btn">
                    <i class="fa-solid fa-bars"></i>
                </a>
            </div>
            <ul class="mobile-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu">Menu</a></li>
                <li><a href="index.html#how-it-works">Service</a></li>
                <li><a href="index.html#about">About us</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="login.html" class="btn">Sign in&NonBreakingSpace;<i class="fa-solid fa-arrow-right-from-bracket"></i></a></li>
            </ul>
        </nav>
    </header>

    <!-- LOGIN FORM -->
    <main class="auth-wrapper">
        <div class="auth-card">
            <h2>Welcome Back!</h2>
            <p class="subtitle">Sign in to your Foodie account</p>

            <div id="alert-msg" class="alert" role="alert"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required minlength="6" autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fa-solid fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-full" id="login-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="divider"><span>or</span></div>

            <p class="auth-footer">
                Don't have an account? <a href="signup.html">Create Account</a>
            </p>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        // Check if already logged in
        (async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`, { credentials: 'include' });
                if (res.ok) {
                    window.location.href = 'profile.html';
                }
            } catch (e) { /* not logged in */ }
        })();

        function showAlert(message, type) {
            const alert = document.getElementById('alert-msg');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Invalid email or password', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In';
                }
            } catch (error) {
                showAlert('Cannot connect to server. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In';
            }
        }

        // Mobile menu toggle
        document.querySelector('.hamburger').addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelector('.mobile-menu').classList.toggle('active');
        });
    </script>
</body>

</html>
