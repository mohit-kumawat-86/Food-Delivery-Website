<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your Foodie order history - Track current orders and view past deliveries.">
    <title>Orders — Foodie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages.css">
</head>

<body>
    <!-- HEADER -->
    <header>
        <nav class="navbar flex between wrapper">
            <a href="index.html" class="logo">Foodie.</a>
            <ul class="navlist flex gap-3">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu">Menu</a></li>
                <li><a href="index.html#how-it-works">Service</a></li>
                <li><a href="index.html#about">About us</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="desktop-action flex gap-2">
                <a href="cart.html" class="cart-icon" id="cart-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-value">0</span>
                </a>
                <a href="profile.html" class="btn" id="sign-in-btn">
                    <i class="fa-solid fa-user"></i> Account
                </a>
                <a href="#" class="hamburger" id="hamburger-btn">
                    <i class="fa-solid fa-bars"></i>
                </a>
            </div>
            <ul class="mobile-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu">Menu</a></li>
                <li><a href="index.html#how-it-works">Service</a></li>
                <li><a href="index.html#about">About us</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="profile.html" class="btn"><i class="fa-solid fa-user"></i> Account</a></li>
            </ul>
        </nav>
    </header>

    <!-- ORDERS PAGE -->
    <main class="page-container orders-page">
        <h2><i class="fa-solid fa-receipt"></i> Your Orders</h2>

        <div id="loading" class="loading">
            <i class="fa-solid fa-spinner"></i>
            <p>Loading your orders...</p>
        </div>

        <div id="orders-content" style="display:none;">
            <div id="no-orders" class="cart-empty" style="display:none;">
                <i class="fa-solid fa-receipt"></i>
                <h3>No orders yet</h3>
                <p>You haven't placed any orders yet. Browse our delicious menu!</p>
                <a href="index.html#restaurants" class="btn">Browse Restaurants</a>
            </div>

            <div id="orders-list" class="orders-list">
                <!-- Orders rendered by JS -->
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadOrders();
        });

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`, { credentials: 'include' });
                if (!res.ok) {
                    window.location.href = 'login.html';
                    return;
                }
                const data = await res.json();
                const signInBtn = document.getElementById('sign-in-btn');
                signInBtn.href = 'profile.html';
                signInBtn.innerHTML = `<i class="fa-solid fa-user"></i> ${data.data.name.split(' ')[0]}`;
            } catch (e) {
                window.location.href = 'login.html';
            }
        }

        async function loadOrders() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('orders-content');
            const noOrders = document.getElementById('no-orders');
            const ordersList = document.getElementById('orders-list');

            try {
                const res = await fetch(`${API_BASE}/orders`, { credentials: 'include' });
                const data = await res.json();

                loading.style.display = 'none';
                content.style.display = 'block';

                if (!data.data || data.data.length === 0) {
                    noOrders.style.display = 'block';
                    return;
                }

                ordersList.innerHTML = data.data.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">Order #${order.id}</span>
                                <span class="order-date">${formatDate(order.created_at)}</span>
                            </div>
                            <span class="order-status status-${order.status}">${order.status}</span>
                        </div>
                        <div class="order-items-list">
                            ${order.items.map(item => `
                                <div class="order-item-row">
                                    <span>${item.product_name} x${item.quantity}</span>
                                    <span>${formatCurrency(item.price * item.quantity)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="order-total-row">
                            <span>Total</span>
                            <span>${formatCurrency(order.total)}</span>
                        </div>
                        ${order.delivery_address ? `<p style="font-size:0.85rem; color:#888; margin-top:0.8rem;"><i class="fa-solid fa-location-dot"></i> ${order.delivery_address}</p>` : ''}
                    </div>
                `).join('');

            } catch (error) {
                loading.innerHTML = '<p>Could not load orders. Please make sure the backend is running.</p>';
            }
        }

        function formatCurrency(amount) {
            return `₹${amount.toLocaleString('en-IN')}`;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-IN', {
                day: 'numeric',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Mobile menu toggle
        document.querySelector('.hamburger').addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelector('.mobile-menu').classList.toggle('active');
        });
    </script>
</body>

</html>
