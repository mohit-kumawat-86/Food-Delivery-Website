<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Foodie account - Sign up to order food, track deliveries, and get exclusive offers.">
    <title>Sign Up — Foodie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages.css">
</head>

<body>
    <!-- HEADER -->
    <header>
        <nav class="navbar flex between wrapper">
            <a href="index.html" class="logo">Foodie.</a>
            <ul class="navlist flex gap-3">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu">Menu</a></li>
                <li><a href="index.html#how-it-works">Service</a></li>
                <li><a href="index.html#about">About us</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="desktop-action flex gap-2">
                <a href="cart.html" class="cart-icon" id="cart-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-value">0</span>
                </a>
                <a href="login.html" class="btn" id="sign-in-btn">
                    Sign in&NonBreakingSpace;<i class="fa-solid fa-arrow-right-from-bracket"></i>
                </a>
                <a href="#" class="hamburger" id="hamburger-btn">
                    <i class="fa-solid fa-bars"></i>
                </a>
            </div>
            <ul class="mobile-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu">Menu</a></li>
                <li><a href="index.html#how-it-works">Service</a></li>
                <li><a href="index.html#about">About us</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="login.html" class="btn">Sign in&NonBreakingSpace;<i class="fa-solid fa-arrow-right-from-bracket"></i></a></li>
            </ul>
        </nav>
    </header>

    <!-- SIGNUP FORM -->
    <main class="auth-wrapper">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="subtitle">Join Foodie and start ordering delicious food</p>

            <div id="alert-msg" class="alert" role="alert"></div>

            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="name" placeholder="Enter your full name" required autocomplete="name">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number <span style="color:#aaa; font-weight:400;">(optional)</span></label>
                    <div class="input-icon">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="phone" placeholder="Enter your phone number" autocomplete="tel">
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Delivery Address <span style="color:#aaa; font-weight:400;">(optional)</span></label>
                    <div class="input-icon">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" id="address" placeholder="Enter your delivery address" autocomplete="street-address">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Create a password (min 6 chars)" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password', 'eye-icon-1')">
                            <i class="fa-solid fa-eye" id="eye-icon-1"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirm-password" placeholder="Confirm your password" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', 'eye-icon-2')">
                            <i class="fa-solid fa-eye" id="eye-icon-2"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-full" id="signup-btn">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="divider"><span>or</span></div>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </p>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        // Check if already logged in
        (async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`, { credentials: 'include' });
                if (res.ok) {
                    window.location.href = 'profile.html';
                }
            } catch (e) { /* not logged in */ }
        })();

        function showAlert(message, type) {
            const alert = document.getElementById('alert-msg');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ name, email, password, phone, address })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Account created! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Registration failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
                }
            } catch (error) {
                showAlert('Cannot connect to server. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
            }
        }

        // Mobile menu toggle
        document.querySelector('.hamburger').addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelector('.mobile-menu').classList.toggle('active');
        });
    </script>
</body>

</html>
